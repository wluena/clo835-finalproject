apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: final
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        # Note: Ensure this image has been pushed to your ECR!
        image: 832666763937.dkr.ecr.us-east-1.amazonaws.com/final-project-repo:mysql-v1
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: db-password  # Ensure matches your secrets.yaml key
        - name: MYSQL_DATABASE
          value: employees
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: mysql-pvc  # UPDATED: Changed from emptyDir to use your PVC
---
apiVersion: v1
kind: Service
metadata:
  name: mysql 
  namespace: final
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  type: ClusterIP