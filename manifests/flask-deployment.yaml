apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: final
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      serviceAccountName: clo835 # This must match the SA you create for S3 access
      containers:
      - name: flask-app
        image: 832666763937.dkr.ecr.us-east-1.amazonaws.com/final-project-repo:latest
        ports:
        - containerPort: 81
        env:
        - name: STUDENT_NAME
          valueFrom:
            configMapKeyRef:
              name: flask-config
              key: STUDENT_NAME
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: flask-config
              key: S3_BUCKET
        - name: S3_IMAGE_NAME
          valueFrom:
            configMapKeyRef:
              name: flask-config
              key: S3_IMAGE_NAME
        - name: DBPWD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: db-password
        - name: DBUSER
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: db-user
        - name: DBHOST
          value: mysql-service
        - name: DBPORT
          value: "3306"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: final
spec:
  type: LoadBalancer # Exposes the app to the internet
  selector:
    app: flask-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 81