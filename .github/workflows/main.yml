name: Build and Push to ECR

on:
  push:
    branches:
      - master  # Mandatory: master branch protection

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flask pymysql boto3 pytest

    - name: Run Unit Tests
      env:
        # This provides the variable the app needs to pass the test
        STUDENT_NAME: "Winlyn Luena, Vernard Canlas, Heracleo Elbina"
      run: |
        python -m pytest test_app.py

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} #updated
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: final-project-repo
        IMAGE_TAG: latest
      run: |
        # Build the docker image
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        # Push the image to ECR
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        
    - name: Update Kubeconfig
      run: |
        aws eks update-kubeconfig --name final-project --region us-east-1

    - name: Deploy to EKS
      run: |
        kubectl apply -f ../manifests/flask-deployment.yaml -n final
        kubectl rollout restart deployment/flask-app -n final