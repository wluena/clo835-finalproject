<!doctype html>
<html>
<head>
    <style>
        body {
            /* Loads image from local storage saved by app.py */
            background-image: url('{{ bg_image }}');
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            text-shadow: 2px 2px 4px #000000;
        }
    </style>
</head>
<body>
    <div style="text-align: center; vertical-align: middle; padding-top: 20px;">
        <h2 style="margin-bottom: 10px;">Hello from Flask - Final Project Demo</h2>
        
        <h1>Project by: {{ name }}</h1>

        {% if contents %}
        <textarea rows="10" cols="50">
            {{ contents }}
        </textarea>
        {% endif %}
    </div>
    <br>
    <center><a href="/" style="color: yellow;">Back to Home</a></center>
</body>
</html>
